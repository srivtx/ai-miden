[package]
name = "bridge"
version = "0.1.0"
description = "Cross-chain bridge with real Ed25519 verification"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "bridge"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = { version = "0.29.0", features = ["init-if-needed"] }
anchor-spl = "0.29.0"
solana-program = "1.17.0"
ed25519-dalek = { version = "1.0.1", default-features = false, features = ["u64_backend"] }
