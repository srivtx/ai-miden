[features]
seeds = false # WHY: Disable automatic seed verification for manual PDA control in this educational build
skip-lint = false # WHY: Enable Anchor linting to catch common security issues during compilation

[programs.localnet]
farm = "Farm111111111111111111111111111111111111111" # WHY: Placeholder program ID for local testing, replaced after deployment
boost = "Boost11111111111111111111111111111111111111" # WHY: Placeholder program ID for local testing, replaced after deployment

[programs.devnet]
farm = "Farm111111111111111111111111111111111111111" # WHY: Devnet program ID updated after initial deployment via deploy.sh
boost = "Boost11111111111111111111111111111111111111" # WHY: Devnet program ID updated after initial deployment via deploy.sh

[registry]
url = "https://api.apr.dev" # WHY: Anchor package registry for publishing verified program IDs

[provider]
cluster = "devnet" # WHY: Default to devnet for testing with real network latency and compute budgets
wallet = "~/.config/solana/id.json" # WHY: Standard Solana CLI keypair location for signing transactions

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts" # WHY: Mocha test runner with 1000s timeout for network operations

[test]
startup_wait = 10000 # WHY: Wait 10 seconds for local validator to start before running tests
shutdown_wait = 2000 # WHY: Wait 2 seconds for clean validator shutdown to prevent port conflicts
upgradeable = true # WHY: Allow program upgrades during development for iterative testing

[test.validator]
bind_address = "127.0.0.1" # WHY: Bind to localhost for security during local testing
ledger = ".anchor/test-ledger" # WHY: Local ledger path for temporary validator state
rpc_port = 8899 # WHY: Standard Solana RPC port for local validator

[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb" # WHY: Clone Token-2022 program to local validator for testing transfer hooks
