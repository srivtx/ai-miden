<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cove — Collaborative Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 0; height: 0; }
::-webkit-scrollbar-thumb { background: transparent; }
::-webkit-scrollbar-track { background: transparent; }
* { scrollbar-width: none; }

:root {
  --bg-canvas: #08090a;
  --bg-panel: #0f1011;
  --bg-elevated: #191a1b;
  --bg-hover: #28282c;
  --text-primary: #f7f8f8;
  --text-secondary: #d0d6e0;
  --text-tertiary: #8a8f98;
  --text-quaternary: #62666d;
  --accent: #5e6ad2;
  --accent-hover: #828fff;
  --border-subtle: rgba(255,255,255,0.05);
  --border-standard: rgba(255,255,255,0.08);
  --border-strong: #23252a;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  color: var(--text-primary);
  background: var(--bg-canvas);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

body { display: grid; grid-template-rows: 44px 1fr; height: 100vh; overflow: hidden; }

/* ─── Topbar ─── */
#topbar {
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  background: var(--bg-panel); border-bottom: 1px solid var(--border-subtle); z-index: 10;
}
#topbar-brand { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.2px; }
#topbar-badge { font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 9999px; background: rgba(255,255,255,0.05); color: var(--text-quaternary); border: 1px solid var(--border-subtle); }
#topbar-spacer { flex: 1; }
#topbar-auth { display: flex; gap: 6px; align-items: center; }
.auth-input {
  padding: 4px 10px; border: 1px solid var(--border-standard); border-radius: var(--radius-md);
  background: rgba(255,255,255,0.02); color: var(--text-primary); font-size: 12px; font-family: var(--font-sans);
  width: 110px; outline: none; transition: border-color 0.15s;
}
.auth-input:focus { border-color: var(--accent); }
.btn {
  padding: 4px 12px; border: none; border-radius: var(--radius-md); cursor: pointer;
  font-size: 12px; font-weight: 500; font-family: var(--font-sans); transition: background 0.15s, color 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-ghost { background: rgba(255,255,255,0.02); color: var(--text-secondary); border: 1px solid var(--border-strong); }
.btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
#user-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }

/* ─── Main Grid ─── */
#main { display: grid; grid-template-columns: 220px 1fr 300px; height: calc(100vh - 44px); overflow: hidden; }

/* ─── Left Sidebar ─── */
#sidebar {
  background: var(--bg-panel); border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; padding: 10px; overflow-y: auto;
}
.sidebar-section { margin-bottom: 14px; }
.sidebar-heading {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-quaternary); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
}
.layer-tag { font-size: 8px; font-weight: 500; padding: 1px 5px; border-radius: 9999px; background: var(--bg-elevated); color: var(--text-quaternary); border: 1px solid var(--border-subtle); }
.side-item {
  padding: 5px 8px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-weight: 400;
  color: var(--text-tertiary); margin: 1px 0; transition: background 0.1s, color 0.1s;
}
.side-item:hover { background: rgba(255,255,255,0.03); color: var(--text-secondary); }
.side-item.active { background: rgba(94,106,210,0.1); color: var(--accent-hover); }
.side-item.muted { color: var(--text-quaternary); cursor: default; }
.side-input {
  width: 100%; padding: 5px 8px; border: 1px solid var(--border-standard); border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.02); color: var(--text-secondary); font-size: 11px; font-family: var(--font-sans);
  outline: none; margin-bottom: 8px; transition: border-color 0.15s;
}
.side-input:focus { border-color: var(--accent); }
.side-input::placeholder { color: var(--text-quaternary); }
.post-row { padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 3px; transition: background 0.1s; }
.post-row:hover { background: rgba(255,255,255,0.03); }
.post-row .title { font-size: 11px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.post-row .author { font-size: 10px; color: var(--text-quaternary); }
.file-upload-label {
  display: block; padding: 8px; border: 1px dashed var(--border-standard); border-radius: var(--radius-md);
  text-align: center; cursor: pointer; font-size: 11px; color: var(--text-quaternary); transition: border-color 0.15s, color 0.15s;
}
.file-upload-label:hover { border-color: var(--accent); color: var(--accent-hover); }
#file-input { display: none; }

/* ─── Center Canvas ─── */
#center { display: flex; flex-direction: column; background: var(--bg-canvas); }
#canvas-toolbar {
  display: flex; align-items: center; gap: 3px; padding: 4px 10px;
  background: var(--bg-panel); border-bottom: 1px solid var(--border-subtle);
}
.tool-btn {
  padding: 3px 8px; border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.02); color: var(--text-quaternary); cursor: pointer;
  font-size: 11px; font-weight: 500; font-family: var(--font-sans); transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.tool-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
.tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tool-color { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border-standard); cursor: pointer; padding: 0; flex-shrink: 0; transition: border-color 0.15s; }
.tool-color:hover { border-color: var(--text-tertiary); }
.tool-spacer { flex: 1; }
.tab-btn {
  padding: 3px 10px; border: none; border-radius: var(--radius-sm);
  background: transparent; color: var(--text-quaternary); cursor: pointer;
  font-size: 11px; font-weight: 500; font-family: var(--font-sans); transition: color 0.1s;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active { background: rgba(255,255,255,0.05); color: var(--text-primary); }
#canvas-wrap { flex: 1; position: relative; overflow: hidden; cursor: crosshair; }
#whiteboard { position: absolute; top: 0; left: 0; }
#doc-panel { display: none; flex: 1; padding: 20px 24px; overflow-y: auto; }
#doc-editor {
  width: 100%; min-height: 200px; padding: 14px 16px; background: rgba(255,255,255,0.02);
  color: var(--text-secondary); border: 1px solid var(--border-standard); border-radius: var(--radius-lg);
  font-size: 14px; line-height: 1.65; font-family: var(--font-sans); resize: vertical;
  outline: none; transition: border-color 0.15s;
}
#doc-editor:focus { border-color: var(--accent); }
#doc-editor:empty::before { content: attr(placeholder); color: var(--text-quaternary); }

/* ─── Right Sidebar ─── */
#rightside {
  background: var(--bg-panel); border-left: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; overflow: hidden;
}
#rightside-tabs { display: flex; border-bottom: 1px solid var(--border-subtle); flex-shrink: 0; }
.right-tab {
  flex: 1; padding: 8px 0; border: none; background: transparent; color: var(--text-quaternary);
  cursor: pointer; font-size: 11px; font-weight: 500; font-family: var(--font-sans);
  transition: color 0.1s; display: flex; align-items: center; justify-content: center; gap: 5px;
}
.right-tab:hover { color: var(--text-secondary); }
.right-tab.active { color: var(--accent-hover); border-bottom: 2px solid var(--accent); margin-bottom: -1px; }
#rightside-body { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

/* Chat */
#chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.chat-msg {
  padding: 5px 8px; border-radius: var(--radius-md); font-size: 12px; line-height: 1.45;
  max-width: 100%; word-break: break-word; background: rgba(255,255,255,0.02);
  border: 1px solid var(--border-subtle);
}
.chat-msg .user { font-weight: 600; color: var(--accent-hover); }
.chat-msg .time { font-size: 10px; color: var(--text-quaternary); margin-left: 6px; font-family: var(--font-mono); }
.chat-msg.system { background: transparent; border: none; color: var(--text-quaternary); font-style: italic; padding: 3px 4px; }
#chat-input-row { display: flex; gap: 5px; }
#chat-input {
  flex: 1; padding: 6px 10px; border: 1px solid var(--border-standard); border-radius: var(--radius-md);
  background: rgba(255,255,255,0.02); color: var(--text-primary); font-size: 12px; font-family: var(--font-sans);
  outline: none; transition: border-color 0.15s;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-quaternary); }

/* Online */
#online-count { font-size: 11px; color: var(--text-quaternary); margin-bottom: 8px; }
.online-user { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary); }
.online-user .dot { width: 7px; height: 7px; border-radius: 50%; background: #27a644; flex-shrink: 0; }
.online-user .me { color: var(--text-primary); font-weight: 500; }

/* Voice */
#voice-panel { display: flex; flex-direction: column; gap: 10px; align-items: center; padding: 16px 0; }
#voice-status { font-size: 12px; color: var(--text-quaternary); }
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-brand">Cove</span>
  <span id="topbar-badge">project 07</span>
  <span style="font-size:10px;color:var(--text-quaternary);">Backend: 32-webrtc</span>
  <div id="topbar-spacer"></div>
  <div id="topbar-auth">
    <div id="auth-form" style="display:flex;gap:5px;">
      <input class="auth-input" id="login-user" placeholder="username" autocomplete="off">
      <input class="auth-input" id="login-pass" type="password" placeholder="password">
      <button class="btn btn-primary" id="btn-login">Login</button>
    </div>
    <div id="auth-user" style="display:none;align-items:center;gap:8px;">
      <span id="user-label"></span>
      <button class="btn btn-ghost" id="btn-logout">Logout</button>
    </div>
  </div>
</div>

<div id="main">
  <!-- LEFT -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading">Workspaces <span class="layer-tag">project 33</span></div>
      <div id="ws-list"><div class="side-item muted">Login to see workspaces</div></div>
      <button class="btn btn-ghost" id="btn-create-ws" style="width:100%;margin-top:6px;display:none;font-size:11px;">+ New Workspace</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Posts <span class="layer-tag">project 17</span></div>
      <input class="side-input" id="search-input" type="text" placeholder="Search posts (FTS5)" disabled>
      <div id="post-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Upload <span class="layer-tag">project 20</span></div>
      <label class="file-upload-label" for="file-input">+ Upload Image</label>
      <input id="file-input" type="file" accept="image/*">
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="canvas-toolbar">
      <button class="tool-btn active" id="tool-pen">Pen</button>
      <button class="tool-btn" id="tool-erase">Eraser</button>
      <button class="tool-color" id="tool-color" style="background:var(--accent);"></button>
      <div class="tool-spacer"></div>
      <button class="tab-btn active" id="tab-canvas">Canvas <span class="layer-tag">project 31</span></button>
      <button class="tab-btn" id="tab-doc">Doc <span class="layer-tag">project 31</span></button>
    </div>
    <div id="canvas-wrap"><canvas id="whiteboard" width="2000" height="1500"></canvas></div>
    <div id="doc-panel"><div id="doc-editor" contenteditable="true" placeholder="Start typing... Collaborative text syncs via WebSocket"></div></div>
  </div>

  <!-- RIGHT -->
  <div id="rightside">
    <div id="rightside-tabs">
      <button class="right-tab active" data-tab="chat">Chat <span class="layer-tag">project 28</span></button>
      <button class="right-tab" data-tab="online">Online <span class="layer-tag">project 30</span></button>
      <button class="right-tab" data-tab="voice">Voice <span class="layer-tag">project 32</span></button>
    </div>
    <div id="rightside-body">
      <div id="tab-chat">
        <div id="chat-messages"><div class="chat-msg system">Connect to see messages</div></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Type a message..." disabled>
          <button class="btn btn-primary" id="btn-send">Send</button>
        </div>
      </div>
      <div id="tab-online" style="display:none;">
        <div id="online-count"></div>
        <div id="online-list"></div>
      </div>
      <div id="tab-voice" style="display:none;">
        <div id="voice-panel">
          <button class="btn btn-primary" id="btn-voice">Start Voice Call</button>
          <div id="voice-status">Not connected</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
const API = "http://localhost:3000";
let token = localStorage.getItem("cove_token") || null;
let user = null;
let ws = null;
let activeTool = "pen";
let currentColor = "#5e6ad2";
const colors = ["#5e6ad2","#27a644","#f7f8f8","#e94560","#ffd369","#d0d6e0"];
let colorIdx = 0;
let isDrawing = false, lastX = 0, lastY = 0;
const canvas = document.getElementById("whiteboard");
const ctx = canvas.getContext("2d");
ctx.lineCap = "round"; ctx.lineJoin = "round";
ctx.strokeStyle = currentColor; ctx.lineWidth = 2;

// ── DOM refs ──
const $ = id => document.getElementById(id);

// ── Auth ──
async function doLogin() {
  const u = $("login-user").value.trim(), p = $("login-pass").value.trim();
  if (!u || !p) return;
  let r = await fetch(API+"/sessions", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
  if (r.ok) { const d = await r.json(); setAuth(d); return; }
  r = await fetch(API+"/users", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
  if (r.ok) { r = await fetch(API+"/sessions", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})}); if (r.ok) { const d = await r.json(); setAuth(d); } }
}
function doLogout() { token=null;user=null;localStorage.removeItem("cove_token");if(ws)ws.close();updateAuthUI(); }
function setAuth(d) { token=d.token;user=d.user;localStorage.setItem("cove_token",token);updateAuthUI();connectWS();loadWs();loadPosts(); }
function updateAuthUI() {
  if (user&&token) { $("auth-form").style.display="none";$("auth-user").style.display="flex";$("user-label").textContent=user.username;$("chat-input").disabled=false;$("search-input").disabled=false;$("btn-create-ws").style.display="block"; }
  else { $("auth-form").style.display="flex";$("auth-user").style.display="none";$("chat-input").disabled=true;$("search-input").disabled=true;$("btn-create-ws").style.display="none";$("ws-list").innerHTML='<div class="side-item muted">Login to see workspaces</div>';$("post-list").innerHTML=""; }
}
$("btn-login").onclick = doLogin;
$("btn-logout").onclick = doLogout;

// ── WebSocket ──
function connectWS() {
  if (!token) return; if (ws) ws.close();
  ws = new WebSocket("ws://localhost:3000/chat?token="+token);
  ws.onopen = ()=>addMsg("Connected to server",true);
  ws.onmessage = (ev)=>{
    try {
      const m = JSON.parse(ev.data);
      if (m.type==="presence:list") updateOnline(m.users);
      else if (m.type==="draw:history") m.ops.forEach(o=>drawRemote(o));
      else if (m.type==="draw") drawRemote(m);
      else if (m.type==="doc-sync") $("doc-editor").innerHTML=m.content;
      else if (m.type==="chat") addMsg('<span class="user">'+esc(m.user)+'</span> '+esc(m.text)+'<span class="time">'+new Date(m.timestamp).toLocaleTimeString()+'</span>');
      else if (m.type==="clear") ctx.clearRect(0,0,canvas.width,canvas.height);
    } catch(e){}
  };
  ws.onclose = ()=>addMsg("Disconnected",true);
}
function addMsg(html, sys) { var d=document.createElement("div");d.className="chat-msg"+(sys?" system":"");d.innerHTML=html;$("chat-messages").appendChild(d);$("chat-messages").scrollTop=$("chat-messages").scrollHeight; }
function esc(s) { return String(s).replace(/[&<>"]/g,function(c){return{'"':"&quot;","&":"&amp;","<":"&lt;",">":"&gt;"}[c];}); }
function sendChat() { var t=$("chat-input").value.trim();if(!t||!ws||ws.readyState!==WebSocket.OPEN)return;ws.send(JSON.stringify({type:"chat",user:user.username,text:t}));$("chat-input").value=""; }
$("btn-send").onclick=sendChat;
$("chat-input").onkeydown=function(e){if(e.key==="Enter")sendChat();};
$("login-pass").onkeydown=function(e){if(e.key==="Enter")doLogin();};

// ── Online ──
function updateOnline(ids) { $("online-count").textContent=ids.length+" online";$("online-list").innerHTML=ids.map(function(id){var me=id===user.userId;return'<div class="online-user"><span class="dot"></span><span class="'+(me?"me":"")+'">User '+id+(me?" (you)":"")+'</span></div>';}).join(""); }

// ── Canvas ──
canvas.onmousedown = function(e){var r=canvas.getBoundingClientRect();isDrawing=true;lastX=e.clientX-r.left;lastY=e.clientY-r.top;ctx.beginPath();ctx.moveTo(lastX,lastY);};
canvas.onmousemove = function(e){
  if (!isDrawing) return;
  var r=canvas.getBoundingClientRect(), x=e.clientX-r.left, y=e.clientY-r.top;
  if (activeTool==="pen") { ctx.strokeStyle=currentColor;ctx.lineWidth=2;ctx.globalCompositeOperation="source-over";ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke(); }
  else { ctx.globalCompositeOperation="destination-out";ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill(); }
  if (ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:"draw",tool:activeTool,color:currentColor,fromX:lastX,fromY:lastY,toX:x,toY:y}));
  lastX=x;lastY=y;
};
canvas.onmouseup = canvas.onmouseleave = function(){isDrawing=false;ctx.globalCompositeOperation="source-over";};

function drawRemote(m) {
  ctx.save();ctx.lineCap="round";ctx.lineJoin="round";
  if (m.tool==="pen"){ctx.strokeStyle=m.color;ctx.lineWidth=2;ctx.globalCompositeOperation="source-over";ctx.beginPath();ctx.moveTo(m.fromX,m.fromY);ctx.lineTo(m.toX,m.toY);ctx.stroke();}
  else {ctx.globalCompositeOperation="destination-out";ctx.beginPath();ctx.arc(m.toX,m.toY,10,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

$("tool-pen").onclick=function(){activeTool="pen";$("tool-pen").classList.add("active");$("tool-erase").classList.remove("active");};
$("tool-erase").onclick=function(){activeTool="erase";$("tool-erase").classList.add("active");$("tool-pen").classList.remove("active");};
$("tool-color").onclick=function(){colorIdx=(colorIdx+1)%colors.length;currentColor=colors[colorIdx];$("tool-color").style.background=currentColor;};

// ── Tabs ──
$("tab-canvas").onclick=function(){$("canvas-wrap").style.display="block";$("doc-panel").style.display="none";$("tab-canvas").classList.add("active");$("tab-doc").classList.remove("active");};
$("tab-doc").onclick=function(){$("canvas-wrap").style.display="none";$("doc-panel").style.display="block";$("tab-doc").classList.add("active");$("tab-canvas").classList.remove("active");};
document.querySelectorAll(".right-tab").forEach(function(b){b.onclick=function(){var t=b.dataset.tab;$("tab-chat").style.display=t==="chat"?"flex":"none";$("tab-online").style.display=t==="online"?"block":"none";$("tab-voice").style.display=t==="voice"?"flex":"none";document.querySelectorAll(".right-tab").forEach(function(bt){bt.classList.toggle("active",bt.dataset.tab===t);});};});

// ── Doc sync ──
$("doc-editor").oninput=function(){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:"doc-sync",content:$("doc-editor").innerHTML}));};

// ── Workspaces ──
async function loadWs(){try{var r=await fetch(API+"/workspaces",{headers:{Authorization:"Bearer "+token}});var d=await r.json();var el=$("ws-list");if(d.data&&d.data.length){el.innerHTML=d.data.map(function(w){return'<div class="side-item">'+esc(w.name)+'</div>';}).join("");}else{el.innerHTML='<div class="side-item muted">No workspaces yet</div>';}}catch(e){}}
$("btn-create-ws").onclick=async function(){var n=prompt("Workspace name:");if(!n||!token)return;try{await fetch(API+"/workspaces",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify({name:n})});loadWs();}catch(e){}};

// ── Posts ──
async function loadPosts(){try{var r=await fetch(API+"/posts?limit=10",{headers:{Authorization:"Bearer "+token}});var d=await r.json();renderPosts(d.data);}catch(e){}}
$("search-input").oninput=async function(){var q=$("search-input").value.trim();try{var url=q?(API+"/posts?q="+encodeURIComponent(q)+"&limit=10"):(API+"/posts?limit=10");var r=await fetch(url,{headers:{Authorization:"Bearer "+token}});var d=await r.json();renderPosts(d.data);}catch(e){}};
function renderPosts(posts){var el=$("post-list");if(!posts||!posts.length){el.innerHTML='<div style="font-size:10px;color:var(--text-quaternary);">No posts</div>';return;}el.innerHTML=posts.map(function(p){return'<div class="post-row"><div class="title">'+esc(p.title)+'</div><div class="author">by '+esc(p.author||"unknown")+'</div></div>';}).join("");}

// ── File upload ──
$("file-input").onchange=async function(){var f=$("file-input").files[0];if(!f||!token)return;var fd=new FormData();fd.append("image",f);fd.append("title",f.name);fd.append("body","Uploaded via Cove");try{await fetch(API+"/posts",{method:"POST",headers:{Authorization:"Bearer "+token},body:fd});loadPosts();}catch(e){}};

// ── Voice ──
var pc=null,ls=null;
$("btn-voice").onclick=async function(){
  if(pc){pc.close();pc=null;$("voice-status").textContent="Call ended";return;}
  try{ls=await navigator.mediaDevices.getUserMedia({audio:true});pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});ls.getTracks().forEach(function(t){pc.addTrack(t,ls);});pc.onicecandidate=function(e){if(e.candidate&&ws)ws.send(JSON.stringify({type:"ice-candidate",candidate:e.candidate}));};pc.ontrack=function(e){var a=new Audio();a.srcObject=e.streams[0];a.play().catch(function(){});};var o=await pc.createOffer();await pc.setLocalDescription(o);if(ws)ws.send(JSON.stringify({type:"webrtc-offer",sdp:o}));$("voice-status").textContent="Connected (local only)";}catch(e){$("voice-status").textContent="Error: "+e.message;}
};

// ── Init ──
if (token) {
  fetch(API+"/sessions/me",{headers:{Authorization:"Bearer "+token}}).then(function(r){return r.json();}).then(function(d){if(d.id){user=d;updateAuthUI();connectWS();loadWs();loadPosts();}else{token=null;localStorage.removeItem("cove_token");updateAuthUI();}}).catch(function(){});
} else { updateAuthUI(); }

console.log("Cove Editor Ready — Linear dark design system applied");
</script>

</body>
</html>
