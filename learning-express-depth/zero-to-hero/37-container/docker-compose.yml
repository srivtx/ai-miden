version: "3.9"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - LOG_LEVEL=info
      - DATABASE_URL=/data/app.db
    volumes:
      - app_data:/data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  app_data:
  redis_data:
